version: "3.9"

services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: raksetu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       raksetu
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: raksetu_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../infra/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raksetu"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: raksetu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ─── Backend services ────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: raksetu-gateway
    restart: unless-stopped
    command: sh -c "pip install boto3 && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./lambdas:/lambdas
      - ./agent:/agent
    environment:
      DATABASE_URL:     postgresql+asyncpg://postgres:raksetu_dev@postgres/raksetu
      REDIS_URL:        redis://redis:6379
      JWT_SECRET:       ${JWT_SECRET:-dev_secret_change_in_production_32chars}
      JWT_ALGORITHM:    HS256
      JWT_EXPIRE_MINUTES: "1440"
      MATCHING_URL:     http://matching-service:8001
      PREDICTION_URL:   http://prediction-service:8002
      NOTIFICATION_URL: http://notification-service:8003
      VOICE_URL:        http://voice-service:8004
      FEDERATED_URL:    http://federated-aggregator:8005
      STORY_URL:        http://story-engine:8007
      ANALYTICS_URL:    http://analytics-service:8008
      DEMO_MODE:        ${DEMO_MODE:-true}
      # ── Bedrock / Agent ────────────────────────────────────────────
      BEDROCK_LITE_MODEL_ID:       ${BEDROCK_LITE_MODEL_ID:-amazon.nova-lite-v1:0}
      BEDROCK_MICRO_MODEL_ID:      ${BEDROCK_MICRO_MODEL_ID:-amazon.nova-micro-v1:0}
      AWS_ACCESS_KEY_ID:           ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:       ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:                  ${AWS_REGION:-us-east-1}
      S3_BUCKET:                   ${S3_BUCKET:-raksetu-models}
      STEP_FUNCTION_ARN_CASCADE:   ${CASCADE_ARN:-}
      MEMORY_CONTEXT_SIZE:         "10"
      DYNAMO_FAILURE_LOG_TABLE:    raksetu-failure-log
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  matching-service:
    build:
      context: .
      dockerfile: matching-service/Dockerfile
    container_name: raksetu-matching
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./matching-service/models:/app/matching-service/models
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:raksetu_dev@postgres/raksetu
      REDIS_URL:    redis://redis:6379
      DEMO_MODE:    ${DEMO_MODE:-true}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  prediction-service:
    build:
      context: .
      dockerfile: prediction-service/Dockerfile
    container_name: raksetu-prediction
    restart: unless-stopped
    command: sh -c "pip install boto3 && uvicorn main:app --host 0.0.0.0 --port 8002"
    ports:
      - "8002:8002"
    volumes:
      - ./prediction-service/models:/app/prediction-service/models
      - ./lambdas:/lambdas
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:raksetu_dev@postgres/raksetu
      REDIS_URL:    redis://redis:6379
      DEMO_MODE:    ${DEMO_MODE:-true}
      # ── Bedrock / Upgrade 4 ────────────────────────────────────────────────
      BEDROCK_MICRO_MODEL_ID:  ${BEDROCK_MICRO_MODEL_ID:-amazon.nova-micro-v1:0}
      AWS_ACCESS_KEY_ID:       ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:   ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:              ${AWS_REGION:-us-east-1}
      S3_BUCKET:               ${S3_BUCKET:-raksetu-models}
      NOTIFICATION_URL:        http://notification-service:8003
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: raksetu-notification
    restart: unless-stopped
    command: sh -c "pip install boto3 && uvicorn main:app --host 0.0.0.0 --port 8003"
    ports:
      - "8003:8003"
    volumes:
      - ./lambdas:/lambdas
    environment:
      DATABASE_URL:     postgresql+asyncpg://postgres:raksetu_dev@postgres/raksetu
      REDIS_URL:        redis://redis:6379
      CELERY_BROKER:    redis://redis:6379/1
      GUPSHUP_API_KEY:  ${GUPSHUP_API_KEY:-}
      GUPSHUP_SOURCE_NUMBER: ${GUPSHUP_SOURCE_NUMBER:-}
      GUPSHUP_APP_NAME: BloodWarriors
      STORY_URL:        http://story-engine:8007
      DEMO_MODE:        ${DEMO_MODE:-true}
      # ── Bedrock / Upgrades 1,3,5 ──────────────────────────────────────
      BEDROCK_LITE_MODEL_ID:  ${BEDROCK_LITE_MODEL_ID:-amazon.nova-lite-v1:0}
      BEDROCK_MICRO_MODEL_ID: ${BEDROCK_MICRO_MODEL_ID:-amazon.nova-micro-v1:0}
      AWS_ACCESS_KEY_ID:      ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:  ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:             ${AWS_REGION:-us-east-1}
      MEMORY_CONTEXT_SIZE:    "10"
      NOTIFICATION_URL:       http://notification-service:8003
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  celery-worker:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: raksetu-celery
    restart: unless-stopped
    command: celery -A main.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL:     postgresql+asyncpg://postgres:raksetu_dev@postgres/raksetu
      REDIS_URL:        redis://redis:6379
      CELERY_BROKER:    redis://redis:6379/1
      GUPSHUP_API_KEY:  ${GUPSHUP_API_KEY:-}
      DEMO_MODE:        ${DEMO_MODE:-true}
    depends_on:
      redis: { condition: service_healthy }

  voice-service:
    build:
      context: .
      dockerfile: voice-service/Dockerfile
    container_name: raksetu-voice
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL:          postgresql+asyncpg://postgres:raksetu_dev@postgres/raksetu
      SARVAM_API_KEY:        ${SARVAM_API_KEY:-}
      EXOTEL_SID:            ${EXOTEL_SID:-}
      EXOTEL_TOKEN:          ${EXOTEL_TOKEN:-}
      EXOTEL_CALLER_ID:      ${EXOTEL_CALLER_ID:-}
      VOICE_CALLBACK_URL:    http://voice-service:8004/call/dtmf-webhook
      DEMO_MODE:             ${DEMO_MODE:-true}
      DEMO_AUDIO_BASE_URL:   http://voice-service:8004/static
    depends_on:
      redis: { condition: service_healthy }

  federated-aggregator:
    build:
      context: .
      dockerfile: federated-aggregator/Dockerfile
    container_name: raksetu-federated
    restart: unless-stopped
    ports:
      - "8005:8005"
      - "9090:9090"    # Flower FL server port
    volumes:
      - ./federated-aggregator/models:/app/federated-aggregator/models/global
    environment:
      FL_MIN_CLIENTS: "2"    # 2 for demo (3 for prod)
      FLOWER_PORT:    "9090"
      MODEL_DIR:      /app/federated-aggregator/models/global
      DEMO_MODE:      ${DEMO_MODE:-true}

  story-engine:
    build:
      context: .
      dockerfile: story-engine/Dockerfile
    container_name: raksetu-story
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL:    postgresql+asyncpg://postgres:raksetu_dev@postgres/raksetu
      REDIS_URL:       redis://redis:6379
      GEMINI_API_KEY:  ${GEMINI_API_KEY:-}
      DEMO_MODE:       ${DEMO_MODE:-true}
      # ── Bedrock (story generation fallback) ──────────────────────────────
      BEDROCK_LITE_MODEL_ID:  ${BEDROCK_LITE_MODEL_ID:-amazon.nova-lite-v1:0}
      AWS_ACCESS_KEY_ID:      ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:  ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:             ${AWS_REGION:-us-east-1}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: raksetu-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  # ─── Federated nodes (demo: 2 simulated hospital nodes) ──────────────────────
  fl-node-hospital-1:
    build:
      context: .
      dockerfile: federated-aggregator/Dockerfile
    container_name: raksetu-fl-node-1
    restart: unless-stopped
    command: python node_client.py --hospital-id hospital_mumbai --aggregator federated-aggregator:9090
    environment:
      HOSPITAL_ID:       hospital_mumbai
      FL_AGGREGATOR_URL: federated-aggregator:9090
    depends_on:
      - federated-aggregator
    profiles:
      - fl   # Only starts with: docker-compose --profile fl up

  fl-node-hospital-2:
    build:
      context: .
      dockerfile: federated-aggregator/Dockerfile
    container_name: raksetu-fl-node-2
    restart: unless-stopped
    command: python node_client.py --hospital-id hospital_delhi --aggregator federated-aggregator:9090
    environment:
      HOSPITAL_ID:       hospital_delhi
      FL_AGGREGATOR_URL: federated-aggregator:9090
    depends_on:
      - federated-aggregator
    profiles:
      - fl

volumes:
  pgdata:

networks:
  default:
    name: raksetu-network
